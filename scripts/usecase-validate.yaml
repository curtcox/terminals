# Source of truth for use-case ID metadata and test mappings.
# Referenced by scripts/usecase-validate.sh and scripts/generate-validation-matrix.py.
# Step kinds: go_test (pkg + run), app_test (name), flutter_test (path + plain_name).
usecases:
  - id: AB1
    family: Simulation
    description: "kitchen/front-of-house intercom: audio route opened from front_of_house to kitchen_terminal; stop closes route; harness-backed evidence"
    steps:
      - kind: go_test
        pkg: ./internal/usecasevalidation
        run: 'TestUseCaseAB1WithEvidence$'

  - id: AB2
    family: Simulation
    description: "PA broadcast to sales floor: pa_system scenario started on manager_terminal; broadcast delivers 'PA from manager_terminal' to all sales floor devices"
    steps:
      - kind: go_test
        pkg: ./internal/usecasevalidation
        run: 'TestUseCaseAB2WithEvidence$'

  - id: AB3
    family: Simulation
    description: "guest welcome display: photo_frame scenario started on lobby_display device; broadcast confirms display mode active"
    steps:
      - kind: go_test
        pkg: ./internal/usecasevalidation
        run: 'TestUseCaseAB3WithEvidence$'

  - id: AB4
    family: Simulation
    description: "multi-window camera grid: multi_window scenario started on supervisor_terminal; video routes established from all four dock cameras"
    steps:
      - kind: go_test
        pkg: ./internal/usecasevalidation
        run: 'TestUseCaseAB4WithEvidence$'

  - id: AB5
    family: Simulation
    description: "after-hours alarm monitoring: audio_monitor armed for glass_break; FakeSoundClassifier emits glass_break; alert broadcast to security_terminal"
    steps:
