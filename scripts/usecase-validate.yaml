  - id: AA2
    family: Simulation
    description: "monitoring agent arms audio monitoring via manual API; fake classifier emits dryer_beep; broadcast targeted at agent device ID"
    steps:
      - kind: go_test
        pkg: ./internal/usecasevalidation
        run: 'TestUseCaseAA2WithEvidence$'

  - id: AA3
    family: Simulation
    description: "AI agent resolves ambiguous voice command via fake LLM; LLM-decoded announce intent routes announcement_audio to a second terminal"
    steps:
      - kind: go_test
        pkg: ./internal/usecasevalidation
        run: 'TestUseCaseAA3WithEvidence$'

  - id: AA4
    family: Simulation
