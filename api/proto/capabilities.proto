syntax = "proto3";

package terminals.capabilities.v1;

option go_package = "github.com/curtcox/terminals/terminal_server/gen/go/capabilities/v1;capabilitiesv1";

message DeviceCapabilities {
  string device_id = 1;
  DeviceIdentity identity = 2;
  ScreenCapability screen = 10;
  KeyboardCapability keyboard = 11;
  PointerCapability pointer = 12;
  TouchCapability touch = 13;
  AudioOutputCapability speakers = 14;
  AudioInputCapability microphone = 15;
  CameraCapability camera = 16;
  SensorCapability sensors = 17;
  ConnectivityCapability connectivity = 18;
  BatteryCapability battery = 19;
}

message DeviceIdentity {
  string device_name = 1;
  string device_type = 2;
  string platform = 3;
}

message ScreenCapability {
  int32 width = 1;
  int32 height = 2;
  double density = 3;
  bool touch = 4;
}

message KeyboardCapability {
  bool physical = 1;
  string layout = 2;
}

message PointerCapability {
  string type = 1;
  bool hover = 2;
}

message TouchCapability {
  bool supported = 1;
  int32 max_points = 2;
}

message AudioOutputCapability {
  int32 channels = 1;
  repeated int32 sample_rates = 2;
}

message AudioInputCapability {
  int32 channels = 1;
  repeated int32 sample_rates = 2;
}

message CameraLens {
  int32 width = 1;
  int32 height = 2;
  int32 fps = 3;
}

message CameraCapability {
  CameraLens front = 1;
  CameraLens back = 2;
}

message SensorCapability {
  bool accelerometer = 1;
  bool gyroscope = 2;
  bool compass = 3;
  bool ambient_light = 4;
  bool proximity = 5;
  bool gps = 6;
}

message ConnectivityCapability {
  string bluetooth_version = 1;
  bool wifi_signal_strength = 2;
  bool usb_host = 3;
  int32 usb_ports = 4;
  bool nfc = 5;
}

message BatteryCapability {
  float level = 1;
  bool charging = 2;
}
