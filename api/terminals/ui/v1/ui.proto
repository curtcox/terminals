syntax = "proto3";

package terminals.ui.v1;

option go_package = "github.com/curtcox/terminals/terminal_server/gen/go/ui/v1;uiv1";

message SetUI {
  string device_id = 1;
  Node root = 2;
}

message UpdateUI {
  string device_id = 1;
  string component_id = 2;
  Node node = 3;
}

message TransitionUI {
  string device_id = 1;
  string transition = 2;
  int32 duration_ms = 3;
}

message Notification {
  string device_id = 1;
  string title = 2;
  string body = 3;
  string level = 4;
}

message Node {
  string id = 1;
  map<string, string> props = 2;
  repeated Node children = 3;

  oneof widget {
    StackWidget stack = 10;
    RowWidget row = 11;
    GridWidget grid = 12;
    ScrollWidget scroll = 13;
    PaddingWidget padding = 14;
    CenterWidget center = 15;
    ExpandWidget expand = 16;
    TextWidget text = 17;
    ImageWidget image = 18;
    VideoSurfaceWidget video_surface = 19;
    AudioVisualizerWidget audio_visualizer = 20;
    CanvasWidget canvas = 21;
    TextInputWidget text_input = 22;
    ButtonWidget button = 23;
    SliderWidget slider = 24;
    ToggleWidget toggle = 25;
    DropdownWidget dropdown = 26;
    GestureAreaWidget gesture_area = 27;
    OverlayWidget overlay = 28;
    ProgressWidget progress = 29;
    FullscreenWidget fullscreen = 30;
    KeepAwakeWidget keep_awake = 31;
    BrightnessWidget brightness = 32;
  }
}

message StackWidget {}
message RowWidget {}

message GridWidget {
  int32 columns = 1;
}

enum ScrollDirection {
  SCROLL_DIRECTION_UNSPECIFIED = 0;
  SCROLL_DIRECTION_VERTICAL = 1;
  SCROLL_DIRECTION_HORIZONTAL = 2;
}

message ScrollWidget {
  // Deprecated: prefer direction_enum. Producers continue to mirror the typed
  // enum into this string during the compatibility window described in
  // docs/compatibility.md. Earliest removal is two tagged releases past
  // 2026-05-03.
  string direction = 1 [deprecated = true];
  ScrollDirection direction_enum = 2;
}

message PaddingWidget {
  int32 all = 1;
}

message CenterWidget {}
message ExpandWidget {}

message TextWidget {
  string value = 1;
  string style = 2;
  string color = 3;
}

message ImageWidget {
  string url = 1;
}

message VideoSurfaceWidget {
  string track_id = 1;
}

message AudioVisualizerWidget {
  string stream_id = 1;
}

message DrawLine {
  double x1 = 1;
  double y1 = 2;
  double x2 = 3;
  double y2 = 4;
  string stroke = 5;
  double stroke_width = 6;
}

message DrawRect {
  double x = 1;
  double y = 2;
  double width = 3;
  double height = 4;
  string fill = 5;
  string stroke = 6;
  double stroke_width = 7;
}

message DrawCircle {
  double cx = 1;
  double cy = 2;
  double radius = 3;
  string fill = 4;
  string stroke = 5;
  double stroke_width = 6;
}

message DrawText {
  double x = 1;
  double y = 2;
  string text = 3;
  string fill = 4;
  double font_size = 5;
  string font_family = 6;
}

message DrawPath {
  string d = 1;
  string fill = 2;
  string stroke = 3;
  double stroke_width = 4;
}

message DrawOp {
  oneof op {
    DrawLine line = 1;
    DrawRect rect = 2;
    DrawCircle circle = 3;
    DrawText text = 4;
    DrawPath path = 5;
  }
}

message CanvasWidget {
  string draw_ops_json = 1;
  repeated DrawOp draw_ops = 2;
}

message TextInputWidget {
  string placeholder = 1;
  bool autofocus = 2;
}

message ButtonWidget {
  string label = 1;
  string action = 2;
}

message SliderWidget {
  double min = 1;
  double max = 2;
  double value = 3;
}

message ToggleWidget {
  bool value = 1;
}

message DropdownWidget {
  repeated string options = 1;
  string value = 2;
}

message GestureAreaWidget {
  string action = 1;
}

message OverlayWidget {}

message ProgressWidget {
  double value = 1;
}

message FullscreenWidget {
  bool enabled = 1;
}

message KeepAwakeWidget {
  bool enabled = 1;
}

message BrightnessWidget {
  double value = 1;
}
