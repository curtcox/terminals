syntax = "proto3";

package terminals.control.v1;

import "terminals/capabilities/v1/capabilities.proto";
import "terminals/io/v1/io.proto";
import "terminals/ui/v1/ui.proto";

option go_package = "github.com/curtcox/terminals/terminal_server/gen/go/control/v1;controlv1";

service TerminalControlService {
  rpc Connect(stream ConnectRequest) returns (stream ConnectResponse);
}

message ConnectRequest {
  oneof payload {
    RegisterDevice register = 1;
    CapabilityUpdate capability = 2;
    terminals.io.v1.InputEvent input = 3;
    terminals.io.v1.SensorData sensor = 4;
    StreamReady stream_ready = 5;
    CommandRequest command = 6;
    Heartbeat heartbeat = 7;
  }
}

message ConnectResponse {
  oneof payload {
    RegisterAck register_ack = 1;
    terminals.ui.v1.SetUI set_ui = 2;
    terminals.io.v1.StartStream start_stream = 3;
    terminals.io.v1.StopStream stop_stream = 4;
    terminals.io.v1.PlayAudio play_audio = 5;
    terminals.io.v1.ShowMedia show_media = 6;
    terminals.io.v1.RouteStream route_stream = 7;
    terminals.ui.v1.Notification notification = 8;
    WebRTCSignal webrtc_signal = 9;
    CommandResult command_result = 10;
    Heartbeat heartbeat = 11;
    ControlError error = 12;
    terminals.ui.v1.UpdateUI update_ui = 13;
    terminals.ui.v1.TransitionUI transition_ui = 14;
  }
}

message RegisterDevice {
  terminals.capabilities.v1.DeviceCapabilities capabilities = 1;
}

message RegisterAck {
  string server_id = 1;
  string message = 2;
}

message CapabilityUpdate {
  terminals.capabilities.v1.DeviceCapabilities capabilities = 1;
}

message StreamReady {
  string stream_id = 1;
}

enum CommandAction {
  COMMAND_ACTION_UNSPECIFIED = 0;
  COMMAND_ACTION_START = 1;
  COMMAND_ACTION_STOP = 2;
}

enum CommandKind {
  COMMAND_KIND_UNSPECIFIED = 0;
  COMMAND_KIND_VOICE = 1;
  COMMAND_KIND_MANUAL = 2;
  COMMAND_KIND_SYSTEM = 3;
}

message CommandRequest {
  string request_id = 1;
  string device_id = 2;
  CommandAction action = 3;
  CommandKind kind = 4;
  string text = 5; // voice transcript
  string intent = 6; // intent name or system intent
}

message CommandResult {
  string request_id = 1; // echoes CommandRequest.request_id
  string scenario_start = 2;
  string scenario_stop = 3;
  string notification = 4;
  map<string, string> data = 5;
}

enum ControlErrorCode {
  CONTROL_ERROR_CODE_UNSPECIFIED = 0;
  CONTROL_ERROR_CODE_INVALID_CLIENT_MESSAGE = 1;
  CONTROL_ERROR_CODE_INVALID_COMMAND_ACTION = 2;
  CONTROL_ERROR_CODE_INVALID_COMMAND_KIND = 3;
  CONTROL_ERROR_CODE_MISSING_COMMAND_INTENT = 4;
  CONTROL_ERROR_CODE_MISSING_COMMAND_TEXT = 5;
  CONTROL_ERROR_CODE_MISSING_COMMAND_DEVICE_ID = 6;
  CONTROL_ERROR_CODE_PROTOCOL_VIOLATION = 7;
  CONTROL_ERROR_CODE_UNKNOWN = 99;
}

message ControlError {
  ControlErrorCode code = 1;
  string message = 2;
}

message WebRTCSignal {
  string stream_id = 1;
  string signal_type = 2;
  string payload = 3;
}

message Heartbeat {
  string device_id = 1;
  int64 unix_ms = 2;
}
