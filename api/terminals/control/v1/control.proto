syntax = "proto3";

package terminals.control.v1;

import "terminals/capabilities/v1/capabilities.proto";
import "terminals/diagnostics/v1/diagnostics.proto";
import "terminals/io/v1/io.proto";
import "terminals/ui/v1/ui.proto";

option go_package = "github.com/curtcox/terminals/terminal_server/gen/go/control/v1;controlv1";

service TerminalControlService {
  rpc Connect(stream ConnectRequest) returns (stream ConnectResponse);
}

enum CarrierKind {
  CARRIER_KIND_UNSPECIFIED = 0;
  CARRIER_KIND_GRPC = 1;
  CARRIER_KIND_WEBSOCKET = 2;
  CARRIER_KIND_TCP = 3;
  CARRIER_KIND_HTTP = 4;
}

message TransportHello {
  uint32 protocol_version = 1;
  repeated CarrierKind supported_carriers = 2;
  string desired_device_id = 3;
  string resume_token = 4;
}

message TransportHelloAck {
  uint32 accepted_protocol_version = 1;
  CarrierKind negotiated_carrier = 2;
  string session_id = 3;
  string resume_token = 4;
  int64 heartbeat_interval_ms = 5;
  map<string, string> limits = 6;
}

message TransportHeartbeat {
  int64 unix_ms = 1;
}

message TransportError {
  string code = 1;
  string message = 2;
}

message WireEnvelope {
  uint32 protocol_version = 1;
  string session_id = 2;
  uint64 sequence = 3;
  oneof payload {
    ConnectRequest client_message = 10;
    ConnectResponse server_message = 11;
    TransportHello transport_hello = 12;
    TransportHelloAck transport_hello_ack = 13;
    TransportHeartbeat transport_heartbeat = 14;
    TransportError transport_error = 15;
  }
}

message ConnectRequest {
  oneof payload {
    Hello hello = 1;
    CapabilitySnapshot capability_snapshot = 2;
    CapabilityDelta capability_delta = 3;

    // Deprecated: use hello + capability_snapshot.
    RegisterDevice register = 20 [deprecated = true];
    // Deprecated: use capability_delta.
    CapabilityUpdate capability = 21 [deprecated = true];

    terminals.io.v1.InputEvent input = 4;
    terminals.io.v1.SensorData sensor = 5;
    StreamReady stream_ready = 6;
    CommandRequest command = 7;
    Heartbeat heartbeat = 8;
    WebRTCSignal webrtc_signal = 9;
    VoiceAudio voice_audio = 10;
    terminals.io.v1.ObservationMessage observation_message = 11;
    terminals.io.v1.ArtifactAvailable artifact_available = 12;
    terminals.io.v1.FlowStats flow_stats = 13;
    terminals.io.v1.ClockSample clock_sample = 14;
    terminals.diagnostics.v1.BugReport bug_report = 15;
  }
}

message VoiceAudio {
  string device_id = 1;
  bytes audio = 2;
  int32 sample_rate = 3;
  bool is_final = 4;
}

message ConnectResponse {
  oneof payload {
    HelloAck hello_ack = 1;
    CapabilityAck capability_ack = 2;

    RegisterAck register_ack = 3;
    terminals.ui.v1.SetUI set_ui = 4;
    terminals.io.v1.StartStream start_stream = 5;
    terminals.io.v1.StopStream stop_stream = 6;
    terminals.io.v1.PlayAudio play_audio = 7;
    terminals.io.v1.ShowMedia show_media = 8;
    terminals.io.v1.RouteStream route_stream = 9;
    terminals.ui.v1.Notification notification = 10;
    WebRTCSignal webrtc_signal = 11;
    CommandResult command_result = 12;
    Heartbeat heartbeat = 13;
    ControlError error = 14;
    terminals.ui.v1.UpdateUI update_ui = 15;
    terminals.ui.v1.TransitionUI transition_ui = 16;
    terminals.io.v1.InstallBundle install_bundle = 17;
    terminals.io.v1.RemoveBundle remove_bundle = 18;
    terminals.io.v1.StartFlow start_flow = 19;
    terminals.io.v1.PatchFlow patch_flow = 20;
    terminals.io.v1.StopFlow stop_flow = 21;
    terminals.io.v1.RequestArtifact request_artifact = 22;
    terminals.diagnostics.v1.BugReportAck bug_report_ack = 23;
  }
}

message Hello {
  string device_id = 1;
  terminals.capabilities.v1.DeviceIdentity identity = 2;
  string client_version = 3;
}

message HelloAck {
  string server_id = 1;
  string session_id = 2;
  int64 heartbeat_interval_ms = 3;
}

message CapabilitySnapshot {
  string device_id = 1;
  uint64 generation = 2;
  terminals.capabilities.v1.DeviceCapabilities capabilities = 3;
}

message CapabilityDelta {
  string device_id = 1;
  uint64 generation = 2;
  terminals.capabilities.v1.DeviceCapabilities capabilities = 3;
  string reason = 4;
}

message CapabilityAck {
  string device_id = 1;
  uint64 accepted_generation = 2;
  bool snapshot_applied = 3;
  repeated ResourceInvalidation invalidations = 4;
}

message ResourceInvalidation {
  string resource = 1;
  string reason = 2;
}

message RegisterDevice {
  terminals.capabilities.v1.DeviceCapabilities capabilities = 1;
}

message RegisterAck {
  string server_id = 1;
  string message = 2;
  map<string, string> metadata = 3;
}

message CapabilityUpdate {
  terminals.capabilities.v1.DeviceCapabilities capabilities = 1;
}

message StreamReady {
  string stream_id = 1;
}

enum CommandAction {
  COMMAND_ACTION_UNSPECIFIED = 0;
  COMMAND_ACTION_START = 1;
  COMMAND_ACTION_STOP = 2;
}

enum CommandKind {
  COMMAND_KIND_UNSPECIFIED = 0;
  COMMAND_KIND_VOICE = 1;
  COMMAND_KIND_MANUAL = 2;
  COMMAND_KIND_SYSTEM = 3;
}

message CommandRequest {
  string request_id = 1;
  string device_id = 2;
  CommandAction action = 3;
  CommandKind kind = 4;
  string text = 5; // voice transcript
  string intent = 6; // intent name or system intent
  map<string, string> arguments = 7; // optional trigger/system arguments (e.g. device_ids)
}

message CommandResult {
  string request_id = 1; // echoes CommandRequest.request_id
  string scenario_start = 2;
  string scenario_stop = 3;
  string notification = 4;
  map<string, string> data = 5;
}

enum ControlErrorCode {
  CONTROL_ERROR_CODE_UNSPECIFIED = 0;
  CONTROL_ERROR_CODE_INVALID_CLIENT_MESSAGE = 1;
  CONTROL_ERROR_CODE_INVALID_COMMAND_ACTION = 2;
  CONTROL_ERROR_CODE_INVALID_COMMAND_KIND = 3;
  CONTROL_ERROR_CODE_MISSING_COMMAND_INTENT = 4;
  CONTROL_ERROR_CODE_MISSING_COMMAND_TEXT = 5;
  CONTROL_ERROR_CODE_MISSING_COMMAND_DEVICE_ID = 6;
  CONTROL_ERROR_CODE_PROTOCOL_VIOLATION = 7;
  CONTROL_ERROR_CODE_UNKNOWN = 99;
}

message ControlError {
  ControlErrorCode code = 1;
  string message = 2;
}

message WebRTCSignal {
  string stream_id = 1;
  string signal_type = 2;
  string payload = 3;
}

message Heartbeat {
  string device_id = 1;
  int64 unix_ms = 2;
}
