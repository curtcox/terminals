syntax = "proto3";

package terminals.io.v1;

option go_package = "github.com/curtcox/terminals/terminal_server/gen/go/io/v1;iov1";

enum StreamKind {
  STREAM_KIND_UNSPECIFIED = 0;
  STREAM_KIND_AUDIO = 1;
  STREAM_KIND_VIDEO = 2;
  STREAM_KIND_SENSOR = 3;
  STREAM_KIND_DATA = 4;
}

// WebRTCSignalType mirrors terminals.control.v1.WebRTCSignalType so that
// packages outside control/v1 (notably diagnostics) can reference a typed
// signal type without creating an import cycle. Keep values numerically
// aligned with control/v1.WebRTCSignalType during the migration window;
// consolidate when buf breaking permits removing the control/v1 copy.
enum WebRTCSignalType {
  WEB_RTC_SIGNAL_TYPE_UNSPECIFIED = 0;
  WEB_RTC_SIGNAL_TYPE_OFFER = 1;
  WEB_RTC_SIGNAL_TYPE_ANSWER = 2;
  WEB_RTC_SIGNAL_TYPE_ICE_CANDIDATE = 3;
}

// StreamOrigin describes why a stream was created. It replaces the
// transitional `origin` key in `StartStream.metadata`.
enum StreamOrigin {
  STREAM_ORIGIN_UNSPECIFIED = 0;
  STREAM_ORIGIN_ROUTE_DELTA = 1;
  STREAM_ORIGIN_RESTORE = 2;
}

// WebRTCMode describes how WebRTC signaling for a stream is managed. It
// replaces the transitional `webrtc_mode` key in `StartStream.metadata`.
enum WebRTCMode {
  WEB_RTC_MODE_UNSPECIFIED = 0;
  WEB_RTC_MODE_SERVER_MANAGED = 1;
  WEB_RTC_MODE_PEER_MANAGED = 2;
}

// StreamRouting carries typed routing/session hints for a stream lifecycle
// message. It is the typed replacement for the well-known stable keys
// (`origin`, `webrtc_mode`) in `StartStream.metadata`.
message StreamRouting {
  StreamOrigin origin = 1;
  WebRTCMode webrtc_mode = 2;
}

// StreamAudioMetadata carries typed audio stream metadata. It is the typed
// replacement for durable StartStream.metadata keys `sample_rate`,
// `channels`, and `codec`.
message StreamAudioMetadata {
  uint32 sample_rate = 1;
  uint32 channels = 2;
  string codec = 3;
}

message StartStream {
  string stream_id = 1;
  string kind = 2;
  string source_device_id = 3;
  string target_device_id = 4;
  map<string, string> metadata = 5;
  StreamKind stream_kind = 6;
  StreamRouting routing = 7;
  StreamAudioMetadata audio_metadata = 8;
}

message StopStream {
  string stream_id = 1;
}

message RouteStream {
  string stream_id = 1;
  string source_device_id = 2;
  string target_device_id = 3;
  string kind = 4;
  StreamKind stream_kind = 5;
  StreamRouting routing = 6;
}

message PlayAudio {
  string request_id = 1;
  string device_id = 2;
  oneof source {
    string url = 3;
    bytes pcm_data = 4;
    string tts_text = 5;
  }
  string format = 6;
}

message ShowMedia {
  string request_id = 1;
  string device_id = 2;
  string media_url = 3;
  string media_type = 4;
}

message InputEvent {
  string device_id = 1;
  oneof payload {
    KeyEvent key = 2;
    PointerEvent pointer = 3;
    TouchEvent touch = 4;
    UIAction ui_action = 5;
  }
}

message KeyEvent {
  string key = 1;
  bool down = 2;
  bool up = 3;
  string text = 4;
}

enum PointerAction {
  POINTER_ACTION_UNSPECIFIED = 0;
  POINTER_ACTION_DOWN = 1;
  POINTER_ACTION_MOVE = 2;
  POINTER_ACTION_UP = 3;
  POINTER_ACTION_CANCEL = 4;
  POINTER_ACTION_SCROLL = 5;
}

message PointerEvent {
  string action = 1;
  double x = 2;
  double y = 3;
  double delta_x = 4;
  double delta_y = 5;
  int32 button = 6;
  PointerAction action_enum = 7;
}

message TouchPoint {
  int32 id = 1;
  double x = 2;
  double y = 3;
}

enum TouchAction {
  TOUCH_ACTION_UNSPECIFIED = 0;
  TOUCH_ACTION_START = 1;
  TOUCH_ACTION_MOVE = 2;
  TOUCH_ACTION_END = 3;
  TOUCH_ACTION_CANCEL = 4;
}

message TouchEvent {
  string action = 1;
  repeated TouchPoint points = 2;
  TouchAction action_enum = 3;
}

message UIAction {
  string component_id = 1;
  string action = 2;
  string value = 3;
}

message SensorData {
  string device_id = 1;
  int64 unix_ms = 2;
  map<string, double> values = 3;
}

enum ExecPolicy {
  EXEC_POLICY_UNSPECIFIED = 0;
  EXEC_POLICY_AUTO = 1;
  EXEC_POLICY_PREFER_CLIENT = 2;
  EXEC_POLICY_REQUIRE_CLIENT = 3;
  EXEC_POLICY_SERVER_ONLY = 4;
}

message FlowNode {
  string id = 1;
  string kind = 2;
  map<string, string> args = 3;
  string exec = 4;
  ExecPolicy exec_policy = 5;
}

message FlowEdge {
  string from = 1;
  string to = 2;
}

message FlowPlan {
  repeated FlowNode nodes = 1;
  repeated FlowEdge edges = 2;
}

message StartFlow {
  string flow_id = 1;
  FlowPlan plan = 2;
}

message PatchFlow {
  string flow_id = 1;
  FlowPlan plan = 2;
}

message StopFlow {
  string flow_id = 1;
}

message DeviceRef {
  string device_id = 1;
}

message Pose {
  double x = 1;
  double y = 2;
  double z = 3;
  double yaw = 4;
  double pitch = 5;
  double roll = 6;
  double confidence = 7;
}

message LocationEstimate {
  string zone = 1;
  Pose pose = 2;
  double radius_m = 3;
  double confidence = 4;
  repeated string sources = 5;
}

message ObservationProvenance {
  string flow_id = 1;
  string node_id = 2;
  string exec_site = 3;
  string model_id = 4;
  string calibration_version = 5;
}

message ArtifactRef {
  string id = 1;
  string kind = 2;
  DeviceRef source = 3;
  int64 start_unix_ms = 4;
  int64 end_unix_ms = 5;
  string uri = 6;
}

message Observation {
  string kind = 1;
  string subject = 2;
  DeviceRef source_device = 3;
  int64 occurred_unix_ms = 4;
  double confidence = 5;
  string zone = 6;
  LocationEstimate location = 7;
  string track_id = 8;
  map<string, string> attributes = 9;
  repeated ArtifactRef evidence = 10;
  ObservationProvenance provenance = 11;
}

message ObservationMessage {
  Observation observation = 1;
}

message ArtifactAvailable {
  ArtifactRef artifact = 1;
}

message RequestArtifact {
  string artifact_id = 1;
}

enum FlowState {
  FLOW_STATE_UNSPECIFIED = 0;
  FLOW_STATE_STARTING = 1;
  FLOW_STATE_RUNNING = 2;
  FLOW_STATE_DEGRADED = 3;
  FLOW_STATE_STOPPING = 4;
  FLOW_STATE_STOPPED = 5;
  FLOW_STATE_FAILED = 6;
}

message FlowStats {
  string flow_id = 1;
  double cpu_pct = 2;
  double mem_mb = 3;
  uint64 dropped_frames = 4;
  string state = 5;
  string error = 6;
  FlowState state_enum = 7;
}

message ClockSample {
  string device_id = 1;
  int64 client_unix_ms = 2;
  int64 server_unix_ms = 3;
  double error_ms = 4;
}

message InstallBundle {
  string bundle_id = 1;
  string version = 2;
  bytes tar_gz = 3;
  string sha256 = 4;
}

message RemoveBundle {
  string bundle_id = 1;
}
