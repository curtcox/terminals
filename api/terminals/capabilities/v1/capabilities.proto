syntax = "proto3";

package terminals.capabilities.v1;

option go_package = "github.com/curtcox/terminals/terminal_server/gen/go/capabilities/v1;capabilitiesv1";

message DeviceCapabilities {
  string device_id = 1;
  DeviceIdentity identity = 2;
  ScreenCapability screen = 10;
  KeyboardCapability keyboard = 11;
  PointerCapability pointer = 12;
  TouchCapability touch = 13;
  AudioOutputCapability speakers = 14;
  AudioInputCapability microphone = 15;
  CameraCapability camera = 16;
  SensorCapability sensors = 17;
  ConnectivityCapability connectivity = 18;
  BatteryCapability battery = 19;
  EdgeCapability edge = 20;
  repeated DisplayCapability displays = 21;
  HapticCapability haptics = 22;
}

message DeviceIdentity {
  string device_name = 1;
  string device_type = 2;
  string platform = 3;
}

message ScreenCapability {
  int32 width = 1;
  int32 height = 2;
  double density = 3;
  bool touch = 4;
  string orientation = 5;
  bool fullscreen_supported = 6;
  bool multi_window_supported = 7;
  Insets safe_area = 8;
}

message Insets {
  int32 left = 1;
  int32 top = 2;
  int32 right = 3;
  int32 bottom = 4;
}

message DisplayCapability {
  string display_id = 1;
  string display_name = 2;
  bool primary = 3;
  ScreenCapability screen = 4;
}

message KeyboardCapability {
  bool physical = 1;
  string layout = 2;
}

message PointerCapability {
  string type = 1;
  bool hover = 2;
}

message TouchCapability {
  bool supported = 1;
  int32 max_points = 2;
}

message AudioOutputCapability {
  int32 channels = 1;
  repeated int32 sample_rates = 2;
  repeated AudioEndpoint endpoints = 3;
}

message AudioInputCapability {
  int32 channels = 1;
  repeated int32 sample_rates = 2;
  repeated AudioEndpoint endpoints = 3;
}

message AudioEndpoint {
  string endpoint_id = 1;
  string endpoint_name = 2;
  string connection_type = 3;
  int32 channels = 4;
  repeated int32 sample_rates = 5;
  bool available = 6;
}

message CameraLens {
  int32 width = 1;
  int32 height = 2;
  int32 fps = 3;
}

message CameraCapability {
  CameraLens front = 1;
  CameraLens back = 2;
  repeated CameraEndpoint endpoints = 3;
}

message CameraEndpoint {
  string endpoint_id = 1;
  string endpoint_name = 2;
  string connection_type = 3;
  string facing = 4;
  repeated CameraLens modes = 5;
  bool available = 6;
}

message SensorCapability {
  bool accelerometer = 1;
  bool gyroscope = 2;
  bool compass = 3;
  bool ambient_light = 4;
  bool proximity = 5;
  bool gps = 6;
}

message ConnectivityCapability {
  string bluetooth_version = 1;
  bool wifi_signal_strength = 2;
  bool usb_host = 3;
  int32 usb_ports = 4;
  bool nfc = 5;
}

message BatteryCapability {
  float level = 1;
  bool charging = 2;
}

message HapticCapability {
  bool supported = 1;
  bool vibration = 2;
  bool haptics_engine = 3;
}

message EdgeCapability {
  repeated string runtimes = 1;
  EdgeComputeCapability compute = 2;
  repeated string operators = 3;
  EdgeRetentionCapability retention = 4;
  EdgeTimingCapability timing = 5;
  EdgeGeometryCapability geometry = 6;
}

message EdgeComputeCapability {
  int32 cpu_realtime = 1;
  int32 gpu_realtime = 2;
  int32 npu_realtime = 3;
  int32 mem_mb = 4;
}

message EdgeRetentionCapability {
  int32 audio_sec = 1;
  int32 video_sec = 2;
  int32 sensor_sec = 3;
  int32 radio_sec = 4;
}

message EdgeTimingCapability {
  double sync_error_ms = 1;
}

message EdgeGeometryCapability {
  bool mic_array = 1;
  bool camera_intrinsics = 2;
  bool compass = 3;
}
