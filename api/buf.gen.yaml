version: v1
plugins:
  - plugin: buf.build/protocolbuffers/go
    out: ../terminal_server
    opt:
      - paths=import
      - module=github.com/curtcox/terminals/terminal_server
  - plugin: buf.build/grpc/go
    out: ../terminal_server
    opt:
      - paths=import
      - module=github.com/curtcox/terminals/terminal_server
  - plugin: buf.build/protocolbuffers/dart
    out: gen/dart
