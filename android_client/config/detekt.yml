# Detekt: buildUponDefaultConfig merges this file with bundled defaults.
# Compose rules require type resolution (enabled by the Android Detekt Gradle integration).

compose:
  ReusedModifierInstance:
    active: true
  UnnecessaryEventHandlerParameter:
    active: true
  ComposableEventParameterNaming:
    active: true
  ComposableParametersOrdering:
    active: true
  ModifierHeightWithText:
    active: true
  MissingModifierDefaultValue:
    active: true
  PublicComposablePreview:
    active: true
  TopLevelComposableFunctions:
    active: false
  ComposableFunctionName:
    active: true
  ConditionCouldBeLifted:
    active: true
    ignoreCallsWithArgumentNames: [ 'modifier', 'contentAlignment' ]

formatting:
  Indentation:
    indentSize: 4
  MaximumLineLength:
    maxLineLength: 120
