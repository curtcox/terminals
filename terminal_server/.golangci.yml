version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - exhaustive
    - gocognit
    - gocritic
    - govet
    - ineffassign
    - misspell
    - prealloc
    - revive
    - staticcheck
    - unused
  settings:
    gocognit:
      min-complexity: 15
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocognit

formatters:
  enable:
    - gofumpt
