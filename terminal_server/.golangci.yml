version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - exhaustive
    - gocognit
    - gocritic
    - govet
    - ineffassign
    - misspell
    - prealloc
    - revive
    - staticcheck
    - unused
  settings:
    gocognit:
      # TODO(complexity): current ceiling is 722 (repl_eval_control_plane_ops.go); aspirational target is 15.
      min-complexity: 730

formatters:
  enable:
    - gofumpt
