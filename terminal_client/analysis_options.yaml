include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - lib/gen/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

dart_code_metrics:
  metrics:
    cyclomatic-complexity: 20
    maximum-nesting-level: 5
    number-of-parameters: 6
    source-lines-of-code: 100
  metrics-exclude:
    - test/**
