name: Client CI

on:
  push:
    paths:
      - "terminal_client/**"
      - "api/**"
      - ".github/workflows/client-ci.yml"
  pull_request:
    paths:
      - "terminal_client/**"
      - "api/**"
      - ".github/workflows/client-ci.yml"

jobs:
  client-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal_client
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux Build Deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Flutter pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Format check
        run: dart format --set-exit-if-changed .
      - name: Test
        run: flutter test --coverage

  client-build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: web
            command: flutter build web
          - os: ubuntu-latest
            target: android
            command: flutter build apk
          - os: ubuntu-latest
            target: linux
            command: flutter build linux
          - os: windows-latest
            target: windows
            command: flutter build windows
          - os: macos-latest
            target: macos
            command: flutter build macos
          - os: macos-latest
            target: ios
            command: flutter build ios --no-codesign
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: terminal_client
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux Build Deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Flutter pub get
        run: flutter pub get
      - name: Build ${{ matrix.target }}
        run: ${{ matrix.command }}
