name: Server CI

on:
  push:
    paths:
      - "terminal_server/**"
      - "api/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    paths:
      - "terminal_server/**"
      - "api/**"
      - ".github/workflows/server-ci.yml"

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal_server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: terminal_server/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: terminal_server
          version: v2.1
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

