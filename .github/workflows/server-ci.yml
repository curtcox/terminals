name: Server CI

on:
  push:
    paths:
      - "terminal_server/**"
      - "docs/usecases-site/**"
      - "scripts/build-usecase-site.py"
      - "usecases/**"
      - "Makefile"
      - "api/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    paths:
      - "terminal_server/**"
      - "docs/usecases-site/**"
      - "scripts/build-usecase-site.py"
      - "usecases/**"
      - "Makefile"
      - "api/**"
      - ".github/workflows/server-ci.yml"

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal_server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: terminal_server/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: terminal_server
          version: v2.9
      - name: Build
        run: go build ./...
      - name: Assert network probe coverage support
        run: bash ../scripts/assert-server-test-network-probe.sh
      - name: Check generated usecase site
        working-directory: ${{ github.workspace }}
        run: make usecases-site-check
      - name: Test
        run: go test ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Test (coverage)
        run: go test ./... -coverprofile=coverage.out
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-coverage
          path: terminal_server/coverage.out
      - name: Upload usecase validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: usecase-validation-${{ github.run_id }}
          path: artifacts/usecase-validation/
          if-no-files-found: ignore
      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
