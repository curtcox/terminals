name: Android client CI

on:
  push:
    paths:
      - "android_client/**"
      - "api/**"
      - "scripts/check-android-client-boundary.sh"
      - "scripts/test-android-client-boundary.sh"
      - "Makefile"
      - ".github/workflows/android-client-ci.yml"
  pull_request:
    paths:
      - "android_client/**"
      - "api/**"
      - "scripts/check-android-client-boundary.sh"
      - "scripts/test-android-client-boundary.sh"
      - "Makefile"
      - ".github/workflows/android-client-ci.yml"

jobs:
  android-client-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ripgrep (boundary scripts)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: true
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-android-gradle-${{ hashFiles('android_client/**/*.gradle.kts', 'android_client/config/**', 'android_client/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-gradle-

      - name: Android client boundary scan
        run: ./scripts/check-android-client-boundary.sh

      - name: Android client boundary tests
        run: ./scripts/test-android-client-boundary.sh

      - name: Unit tests, lint, detektMain, debug assemble, compile instrumentation tests
        working-directory: android_client
        run: ./gradlew testDebugUnitTest lintDebug detektMain assembleDebug compileDebugAndroidTestKotlin --no-daemon

  # OWASP Dependency-Check can take a long time on a cold NVD cache without NVD_API_KEY; keep it parallel to the main checks.
  android-client-dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: true
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-android-gradle-${{ hashFiles('android_client/**/*.gradle.kts', 'android_client/config/**', 'android_client/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-gradle-

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v5
        with:
          path: ~/.gradle/dependency-check-data
          key: ${{ runner.os }}-owasp-dc-${{ hashFiles('android_client/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-owasp-dc-

      - name: OWASP Dependency-Check (runtime classpaths)
        if: ${{ env.NVD_API_KEY != '' }}
        working-directory: android_client
        run: ./gradlew :app:dependencyCheckAnalyze --no-daemon

      - name: Skip OWASP Dependency-Check (NVD_API_KEY missing)
        if: ${{ env.NVD_API_KEY == '' }}
        run: echo 'Skipping dependency-check because NVD_API_KEY is not configured for this repository.'

  android-client-instrumentation:
    needs: android-client-checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: true
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "emulator" "system-images;android-29;default;x86_64"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-android-gradle-${{ hashFiles('android_client/**/*.gradle.kts', 'android_client/config/**', 'android_client/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-gradle-

      - name: Instrumentation tests (API 29 emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: cd android_client && ./gradlew connectedDebugAndroidTest --no-daemon
