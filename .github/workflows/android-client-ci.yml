name: Android client CI

on:
  push:
    paths:
      - "android_client/**"
      - "api/**"
      - "scripts/check-android-client-boundary.sh"
      - "scripts/test-android-client-boundary.sh"
      - "Makefile"
      - ".github/workflows/android-client-ci.yml"
  pull_request:
    paths:
      - "android_client/**"
      - "api/**"
      - "scripts/check-android-client-boundary.sh"
      - "scripts/test-android-client-boundary.sh"
      - "Makefile"
      - ".github/workflows/android-client-ci.yml"

jobs:
  android-client-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ripgrep (boundary scripts)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true
          packages: |
            platform-tools
            platforms;android-36
            build-tools;36.0.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-android-gradle-${{ hashFiles('android_client/**/*.gradle.kts', 'android_client/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-gradle-

      - name: Android client boundary scan
        run: ./scripts/check-android-client-boundary.sh

      - name: Android client boundary tests
        run: ./scripts/test-android-client-boundary.sh

      - name: Unit tests, lint, debug assemble, compile instrumentation tests
        working-directory: android_client
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug compileDebugAndroidTestKotlin --no-daemon

  android-client-instrumentation:
    needs: android-client-checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true
          packages: |
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            emulator
            system-images;android-30;google_apis;x86_64

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-android-gradle-${{ hashFiles('android_client/**/*.gradle.kts', 'android_client/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-gradle-

      - name: Instrumentation tests (API 30 emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: cd android_client && ./gradlew connectedDebugAndroidTest --no-daemon
